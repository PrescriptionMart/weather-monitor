name: Daily dashboard reminder

on:
  schedule:
    # Runs Monday-Friday at 8:00 AM Central (13:00 UTC)
    # Skips weekends since shipping decisions are weekday operations
    - cron: '0 13 * * 1-5'
  workflow_dispatch: # also allows manual trigger from Actions tab

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send reminder email via Gmail
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          REMINDER_EMAIL: BClay@scriptcare.com
        run: |
          node - <<'EOF'
          const https = require('https');

          async function getToken() {
            const body = JSON.stringify({
              client_id: process.env.GMAIL_CLIENT_ID,
              client_secret: process.env.GMAIL_CLIENT_SECRET,
              refresh_token: process.env.GMAIL_REFRESH_TOKEN,
              grant_type: 'refresh_token'
            });
            return new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'oauth2.googleapis.com', path: '/token', method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Content-Length': body.length }
              }, res => {
                let data = ''; res.on('data', c => data += c);
                res.on('end', () => resolve(JSON.parse(data).access_token));
              });
              req.on('error', reject); req.write(body); req.end();
            });
          }

          async function sendEmail(token, subject, body) {
            const raw = Buffer.from(
              `To: ${process.env.REMINDER_EMAIL}\nSubject: ${subject}\nContent-Type: text/plain; charset=utf-8\n\n${body}`
            ).toString('base64url');
            const payload = JSON.stringify({ raw });
            return new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'gmail.googleapis.com',
                path: '/gmail/v1/users/me/messages/send',
                method: 'POST',
                headers: {
                  'Authorization': 'Bearer ' + token,
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(payload)
                }
              }, res => {
                let data = ''; res.on('data', c => data += c);
                res.on('end', () => { console.log('Email sent:', res.statusCode); resolve(); });
              });
              req.on('error', reject); req.write(payload); req.end();
            });
          }

          async function main() {
            const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            const subject = `Reminder: Check overnight shipping weather — ${today}`;
            const body = `Good morning,

Quick reminder to check the overnight shipping weather dashboard before today's sort decisions go out.

Dashboard: https://prescriptionmart.github.io/weather-monitor

The dashboard shows the next 3 sort windows (10pm-4am local) at FedEx Memphis and UPS Louisville, plus regional watch zones. If conditions warrant a hold, generate the team email directly from the dashboard.

— Prescription Mart Shipping Weather Monitor`;

            const token = await getToken();
            await sendEmail(token, subject, body);
            console.log('Reminder sent.');
          }

          main().catch(e => { console.error('Error:', e); process.exit(1); });
          EOF
